<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-Sketch</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="window">
        <section class="selection">
            <div>
                <label for="height">Height</label>
                <input type="range" id="height" name="height" min="16" max="100" value="16">
                <label for="height" id="height-value">16</label>
            </div>
            <div>
                <label for="width">Width</label>
                <input type="range" id="width" name="width" min="16" max="100" value="16">
                <label for="width" id="width-value">16</label>
            </div>
            <div class="color-selector-container">
                <label for="color-selector">Cell color</label>
                <input type="color" name="color-selector" id="color-selector" value=#ebebeb>
            </div>
            <div>
                <button class="btn">reset</button>
            </div>
        </section>
        <section>
            <div class="container"></div>
        </section>
    </div>
</body>
<script src="script.js"></script>
</html>
